  "manifest": {
    "version": 1,
    "install": {
      "_1password": {
        "pkg-path": "_1password",
        "version": "1password-cli-2.29.0"
      },
      "awscli2": {
        "pkg-path": "awscli2",
        "version": "2.17.0"
      },
      "github-cli": {
        "pkg-path": "github-cli",
        "version": "gh-2.52.0"
      },
      "gum": {
        "pkg-path": "gum",
        "version": "0.14.1"
      }
    },
    "vars": {},
    "hook": {
      "on-activate": "# Function to authenticate with 1Password; this is called by the 'aws' alias in [profile]\nauthenticate_1password() {\n    local config_file=\"$HOME/.config/flox/1password.session\"\n\n    [[ -f \"$config_file\" ]] && source \"$config_file\"\n\n    if [[ \"${ENABLE_1PASSWORD_PERSISTENCE}\" != \"true\" ]]; then\n        echo \"1Password session persistence is not enabled. Skipping authentication.\"\n        return 0\n    fi\n\n    # Check if the token exists and is valid\n    if [[ -n \"${OP_SESSION_TOKEN}\" ]]; then\n        if op whoami --session \"${OP_SESSION_TOKEN}\" >/dev/null 2>&1; then\n            echo \"Existing 1Password session is valid.\"\n            return 0\n        else\n            echo \"Existing 1Password session is invalid. Re-authenticating...\"\n            unset OP_SESSION_TOKEN\n        fi\n    else\n        echo \"No existing 1Password session found. Authenticating...\"\n    fi\n\n    max_retries=5\n    retry_count=0\n    while true; do\n        OP_SESSION_TOKEN=$(op signin --raw 2>&1)\n        if [[ $? -eq 0 ]]; then\n            # Remove the old session token and insert the new one in its place\n            sed -i '/# BEGIN 1PASSWORD SESSION TOKEN/,/# END 1PASSWORD SESSION TOKEN/c\\\n# BEGIN 1PASSWORD SESSION TOKEN\\\nOP_SESSION_TOKEN='\"${OP_SESSION_TOKEN}\"'\\\n# END 1PASSWORD SESSION TOKEN' \"$config_file\"\n\n            # If the session token section doesn't exist, append it\n            if ! grep -q \"# BEGIN 1PASSWORD SESSION TOKEN\" \"$config_file\"; then\n                echo >> \"$config_file\"\n                echo \"# BEGIN 1PASSWORD SESSION TOKEN\" >> \"$config_file\"\n                echo \"OP_SESSION_TOKEN=${OP_SESSION_TOKEN}\" >> \"$config_file\"\n                echo \"# END 1PASSWORD SESSION TOKEN\" >> \"$config_file\"\n            fi\n            \n            echo \"Authentication successful.\"\n            break\n        else\n            retry_count=$((retry_count + 1))\n            if [[ ${retry_count} -ge ${max_retries} ]]; then\n                echo \"Maximum number of retries exceeded. Please check your 1Password credentials and try again.\"\n                return 1\n            else\n                echo \"Invalid password. Please try again.\"\n            fi\n        fi\n    done\n\n    # Here we export the OP_SESSION_TOKEN for use in the current session\n    export OP_SESSION_TOKEN\n}\n\n# Call the 1Password authentication function\nauthenticate_1password\n\n# Export the OP_SESSION_TOKEN for use in the profile scripts\nexport OP_SESSION_TOKEN\n\n"
    },
    "profile": {
      "common": "# Source the 1password.session file\n[[ -f ~/.config/flox/1password.session ]] && source ~/.config/flox/1password.session\n\n# Alias to run the aws command. Set the OP_VAULT, OP_AWS_CREDENTIALS, and\n# OP_AWS_USERNAME_FIELD variables in ~/.config/flox/1password.session.\n# Alternatively, you can hard-code your credentials in the command below\n# or as environment variables in the [vars] section above!\nalias aws='op run --session \"${OP_SESSION_TOKEN}\" --env-file <(printf \"%s\\n\" AWS_ACCESS_KEY_ID=op://${OP_VAULT}/${OP_AWS_CREDENTIALS}/${OP_AWS_USERNAME_FIELD} AWS_SECRET_ACCESS_KEY=op://${OP_VAULT}/${OP_AWS_CREDENTIALS}/${OP_AWS_CREDENTIALS_FIELD}) -- aws'alias aws='op run --session \"${OP_SESSION_TOKEN}\" --env-file <(printf \"%s\\n\" AWS_ACCESS_KEY_ID=op://${OP_VAULT}/${OP_AWS_CREDENTIALS}/username AWS_SECRET_ACCESS_KEY=op://${OP_VAULT}/${OP_AWS_CREDENTIALS}/credential) -- aws'\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ],
      "allow": {
        "licenses": []
      },
      "semver": {}
    }
  },
